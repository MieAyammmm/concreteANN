<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klasifikasi Kuat Tekan Beton (ANN)</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f6f9;
        color: #333;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 10px;
      }
      p.subtitle {
        text-align: center;
        color: #7f8c8d;
        font-size: 0.9em;
        margin-bottom: 30px;
      }
      .input-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
      }
      @media (max-width: 600px) {
        .input-group {
          grid-template-columns: 1fr;
        }
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        font-size: 0.9em;
      }
      input[type="number"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 10px;
      }
      button:hover {
        background-color: #2980b9;
      }
      .result-box {
        margin-top: 30px;
        padding: 20px;
        border-radius: 5px;
        text-align: center;
        display: none;
      }
      .result-low {
        background-color: #ffebee;
        color: #c62828;
        border: 1px solid #ef9a9a;
      }
      .result-medium {
        background-color: #fff3e0;
        color: #ef6c00;
        border: 1px solid #ffcc80;
      }
      .result-high {
        background-color: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #a5d6a7;
      }
      .confidence {
        font-size: 0.85em;
        margin-top: 5px;
        opacity: 0.8;
      }
      .footer {
        margin-top: 40px;
        text-align: center;
        font-size: 0.8em;
        color: #aaa;
      }
      #debug-area {
        margin-top: 20px;
        padding: 10px;
        background: #eee;
        font-family: monospace;
        font-size: 12px;
        display: none;
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏗️ Klasifikasi Kuat Tekan Beton</h1>
      <p class="subtitle">Artificial Neural Network (ANN) - 8 Fitur Input</p>

      <!-- Form Input -->
      <div class="input-group">
        <div>
          <label for="cement">Semen (kg/m³)</label
          ><input
            type="number"
            id="cement"
            step="0.1"
            placeholder="Contoh: 250"
          />
        </div>
        <div>
          <label for="slag">Blast Furnace Slag (kg/m³)</label
          ><input
            type="number"
            id="slag"
            step="0.1"
            placeholder="Contoh: 100"
          />
        </div>
        <div>
          <label for="flyash">Fly Ash (kg/m³)</label
          ><input
            type="number"
            id="flyash"
            step="0.1"
            placeholder="Contoh: 50"
          />
        </div>
        <div>
          <label for="water">Air (kg/m³)</label
          ><input
            type="number"
            id="water"
            step="0.1"
            placeholder="Contoh: 180"
          />
        </div>
        <div>
          <label for="superplasticizer">Superplasticizer (kg/m³)</label
          ><input
            type="number"
            id="superplasticizer"
            step="0.1"
            placeholder="Contoh: 5"
          />
        </div>
        <div>
          <label for="coarse">Coarse Aggregate (kg/m³)</label
          ><input
            type="number"
            id="coarse"
            step="0.1"
            placeholder="Contoh: 900"
          />
        </div>
        <div>
          <label for="fine">Fine Aggregate (kg/m³)</label
          ><input
            type="number"
            id="fine"
            step="0.1"
            placeholder="Contoh: 700"
          />
        </div>
        <div>
          <label for="age">Umur (Hari)</label
          ><input type="number" id="age" step="1" placeholder="Contoh: 28" />
        </div>
      </div>

      <button onclick="predictConcrete()">Prediksi Kelas Kekuatan</button>

      <!-- Hasil Prediksi -->
      <div id="result" class="result-box">
        <h2 id="prediction-title" style="margin: 0"></h2>
        <div id="prediction-detail" class="confidence"></div>
      </div>

      <!-- Debug Area -->
      <div id="debug-area"></div>
    </div>

    <div class="footer">
      Dibuat untuk Tugas ANN Teknik Informatika | Model Accuracy: ~88%
    </div>

    <script>
      let modelData = null;
      const debugArea = document.getElementById("debug-area");

      function logDebug(msg) {
        console.log(msg);
        debugArea.style.display = "block";
        debugArea.innerHTML += msg + "<br>";
      }

      // 1. Load Model JSON secara otomatis saat halaman dibuka
      fetch("concrete_model.json")
        .then((response) => {
          if (!response.ok)
            throw new Error("Gagal mengambil file concrete_model.json");
          return response.json();
        })
        .then((data) => {
          modelData = data;
          logDebug("✅ Model berhasil dimuat!");
          logDebug("Jumlah Fitur di JSON: " + modelData.scaler_mean.length);

          // Cek apakah key memiliki spasi di akhir (masalah umum dari Python dict)
          // Kita normalisasi akses jika perlu, tapi biasanya JSON.dump bersih.
        })
        .catch((error) => {
          logDebug("❌ ERROR: " + error.message);
          alert(
            "Gagal memuat concrete_model.json. Pastikan file ada di folder yang sama dengan index.html.",
          );
        });

      // Fungsi Matematika ANN
      function relu(z) {
        return z.map((val) => Math.max(0, val));
      }

      function softmax(z) {
        const maxVal = Math.max(...z);
        const exps = z.map((val) => Math.exp(val - maxVal));
        const sumExps = exps.reduce((a, b) => a + b, 0);
        return exps.map((val) => val / sumExps);
      }

      function dotProduct(matrix, vector) {
        return matrix.map((row) =>
          row.reduce((sum, val, i) => sum + val * vector[i], 0),
        );
      }

      function addVector(v1, v2) {
        return v1.map((val, i) => val + v2[i]);
      }

      function predictConcrete() {
        if (!modelData) {
          alert("Model belum siap. Cek Console/Debug Area di bawah form.");
          return;
        }

        try {
          // 2. Ambil Input & Bersihkan Koma (jika user pakai koma desimal)
          const getVal = (id) => {
            let val = document.getElementById(id).value.replace(",", ".");
            return parseFloat(val) || 0;
          };

          // URUTAN INI HARUS SAMA PERSIS DENGAN URUTAN DI DATASET CONCRETE ANDA
          const inputs = [
            getVal("cement"), // 0
            getVal("slag"), // 1
            getVal("flyash"), // 2
            getVal("water"), // 3
            getVal("superplasticizer"), // 4
            getVal("coarse"), // 5
            getVal("fine"), // 6
            getVal("age"), // 7
          ];

          logDebug("Input Raw: " + inputs.join(", "));

          // 3. Normalisasi Input (Standard Scaler)
          const mean = modelData.scaler_mean;
          const std = modelData.scaler_std;

          if (!mean || !std)
            throw new Error("Scaler data tidak ditemukan di JSON");

          const scaledInputs = inputs.map((val, i) => {
            return (val - mean[i]) / std[i];
          });

          logDebug(
            "Scaled Inputs: " +
              scaledInputs.map((n) => n.toFixed(4)).join(", "),
          );

          // 4. Forward Pass
          // Layer 1: Input (8) -> Hidden 1 (16)
          let z1 = addVector(
            dotProduct(modelData.W1, scaledInputs),
            modelData.b1,
          );
          let a1 = relu(z1);

          // Layer 2: Hidden 1 (16) -> Hidden 2 (8)
          let z2 = addVector(dotProduct(modelData.W2, a1), modelData.b2);
          let a2 = relu(z2);

          // Output Layer: Hidden 2 (8) -> Output (3)
          let z3 = addVector(dotProduct(modelData.W3, a2), modelData.b3);
          let probabilities = softmax(z3);

          logDebug(
            "Probabilities: " +
              probabilities.map((p) => (p * 100).toFixed(2) + "%").join(", "),
          );

          // 5. Tentukan Kelas
          const classes = [
            "Low Strength (<30 MPa)",
            "Medium Strength (30-50 MPa)",
            "High Strength (>50 MPa)",
          ];
          const maxProb = Math.max(...probabilities);
          const predictedIndex = probabilities.indexOf(maxProb);

          // Cek jika maxProb adalah NaN
          if (isNaN(maxProb))
            throw new Error("Hasil probabilitas NaN. Cek bobot/model.");

          const predictedClass = classes[predictedIndex];

          // 6. Tampilkan Hasil
          const resultBox = document.getElementById("result");
          const title = document.getElementById("prediction-title");
          const detail = document.getElementById("prediction-detail");

          resultBox.style.display = "block";
          resultBox.className = "result-box";

          if (predictedIndex === 0) resultBox.classList.add("result-low");
          else if (predictedIndex === 1)
            resultBox.classList.add("result-medium");
          else resultBox.classList.add("result-high");

          title.innerText = predictedClass;
          detail.innerText = `Tingkat Keyakinan: ${(maxProb * 100).toFixed(2)}%`;

          logDebug("✅ Prediksi Berhasil: " + predictedClass);
        } catch (err) {
          console.error(err);
          logDebug("❌ ERROR SAAT PREDIKSI: " + err.message);
          alert(
            "Terjadi kesalahan saat prediksi. Lihat area debug di bawah form.",
          );
        }
      }
    </script>
  </body>
</html>
