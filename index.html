<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANN • Concrete Strength Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --accent: #22d3ee;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(180deg, #0a0f1c 0%, #0f172a 100%);
        color: #e2e8f0;
        min-height: 100vh;
      }
      .header-font {
        font-family: "Space Grotesk", sans-serif;
      }
      .glass {
        background: rgba(17, 24, 39, 0.85);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(148, 163, 184, 0.15);
      }
      .neon-btn {
        background: linear-gradient(90deg, #22d3ee, #6366f1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .neon-btn:hover {
        transform: translateY(-4px) scale(1.04);
        box-shadow: 0 0 30px -5px rgb(34 211 238);
      }
      .input-card {
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 15px 25px -5px rgba(34, 211, 238, 0.15);
      }
      .progress-bar {
        transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
    </style>
  </head>
  <body class="min-h-screen pb-12">
    <header
      class="border-b border-slate-700 bg-black/70 backdrop-blur-lg sticky top-0 z-50"
    >
      <div
        class="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-indigo-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg"
          >
            🧠
          </div>
          <div>
            <h1
              class="header-font text-3xl font-semibold tracking-tighter text-white"
            >
              Prediksi Kekuatan Beton
            </h1>
            <p class="text-cyan-400 text-sm -mt-1">Artificial Neural Network</p>
          </div>
        </div>
        <div
          class="flex items-center gap-2 text-emerald-400 text-sm font-medium"
        >
          <div
            class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse"
          ></div>
          <span id="model-status">MODEL READY</span>
        </div>
      </div>
    </header>

    <main
      class="max-w-7xl mx-auto px-8 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8"
    >
      <!-- INPUT SECTION -->
      <div class="lg:col-span-8 glass rounded-3xl p-8 shadow-2xl">
        <div class="flex items-center gap-4 mb-8">
          <span class="text-4xl">📊</span>
          <div>
            <h2 class="text-3xl font-semibold tracking-tight">
              Parameter Campuran Beton
            </h2>
            <p class="text-slate-400 text-sm mt-1" id="arch-info"></p>
          </div>
        </div>

        <!-- Quick Presets -->
        <div class="flex flex-wrap gap-3 mb-8" id="presets">
          <button
            onclick="loadPreset(0)"
            class="px-6 py-2.5 text-sm font-medium rounded-2xl border border-slate-600 hover:border-cyan-400 hover:text-cyan-400 transition-all"
          >
            Beton Normal
          </button>
          <button
            onclick="loadPreset(1)"
            class="px-6 py-2.5 text-sm font-medium rounded-2xl border border-slate-600 hover:border-cyan-400 hover:text-cyan-400 transition-all"
          >
            Kekuatan Tinggi
          </button>
          <button
            onclick="loadPreset(2)"
            class="px-6 py-2.5 text-sm font-medium rounded-2xl border border-slate-600 hover:border-cyan-400 hover:text-cyan-400 transition-all"
          >
            Ramah Lingkungan
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="input-fields">
          <!-- Input fields akan digenerate oleh JS -->
        </div>

        <button
          onclick="predictConcrete()"
          id="predict-btn"
          class="neon-btn w-full mt-12 py-6 rounded-2xl text-xl font-semibold text-black flex items-center justify-center gap-4 shadow-xl"
        >
          <span id="btn-text">🚀 Run Neural Network Analysis</span>
        </button>
      </div>

      <!-- SIDEBAR -->
      <div class="lg:col-span-4 space-y-6">
        <!-- Live Preview -->
        <div class="glass rounded-3xl p-7">
          <h3 class="font-semibold text-lg mb-5 flex items-center gap-3">
            <span>🔬</span> Live Composition
          </h3>
          <div id="live-preview" class="space-y-5 text-sm"></div>
        </div>

        <!-- Result Card -->
        <div
          id="status-card"
          class="glass rounded-3xl p-8 min-h-[460px] flex flex-col"
        >
          <div
            id="placeholder"
            class="flex-1 flex flex-col items-center justify-center text-center"
          >
            <div class="text-7xl mb-6 opacity-40">🧠</div>
            <p class="text-slate-400 max-w-[220px]">
              Masukkan data lalu klik tombol analisis untuk melihat prediksi
              kekuatan beton
            </p>
          </div>

          <div id="result-content" class="hidden flex-1">
            <div id="main-result" class="text-center mb-8"></div>
            <canvas id="strengthChart" height="180"></canvas>
            <div id="prob-list" class="mt-8 space-y-6"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="text-center text-slate-500 text-xs py-8">
      Artificial Neural Network • Dynamic Architecture Support
    </footer>

    <script>
      // ================== DATA INPUT ==================
      const fields = [
        {
          id: "cement",
          label: "Semen (kg/m³)",
          icon: "🧱",
          min: 100,
          max: 600,
          step: 1,
          default: 350,
        },
        {
          id: "slag",
          label: "Terak Tanur (kg/m³)",
          icon: "🏭",
          min: 0,
          max: 300,
          step: 1,
          default: 0,
        },
        {
          id: "flyash",
          label: "Abu Batu Bara (kg/m³)",
          icon: "🌫️",
          min: 0,
          max: 250,
          step: 1,
          default: 0,
        },
        {
          id: "water",
          label: "Air (kg/m³)",
          icon: "💧",
          min: 100,
          max: 250,
          step: 1,
          default: 180,
        },
        {
          id: "superplasticizer",
          label: "Pengurang Kadar Air (kg/m³)",
          icon: "🧪",
          min: 0,
          max: 15,
          step: 0.1,
          default: 2,
        },
        {
          id: "coarse",
          label: "Batu Koral (kg/m³)",
          icon: "🪨",
          min: 800,
          max: 1300,
          step: 1,
          default: 1050,
        },
        {
          id: "fine",
          label: "Pasir (kg/m³)",
          icon: "🏜️",
          min: 500,
          max: 900,
          step: 1,
          default: 700,
        },
        {
          id: "age",
          label: "Umur (Hari)",
          icon: "📅",
          min: 1,
          max: 365,
          step: 1,
          default: 28,
        },
      ];

      let modelData = null;
      let radarChart = null;

      // ================== FUNGSI MATRIKS ==================
      // Transpose matriks
      function transpose(matrix) {
        return matrix[0].map((_, colIndex) =>
          matrix.map((row) => row[colIndex]),
        );
      }

      // Perkalian matriks dengan vektor
      function matrixVectorMultiply(matrix, vector) {
        return matrix.map((row) =>
          row.reduce((sum, val, i) => sum + val * vector[i], 0),
        );
      }

      // Penjumlahan vektor
      function vectorAdd(v1, v2) {
        return v1.map((val, i) => val + v2[i]);
      }

      // ReLU activation
      function relu(vector) {
        return vector.map((v) => Math.max(0, v));
      }

      // Softmax activation
      function softmax(vector) {
        const max = Math.max(...vector);
        const exps = vector.map((v) => Math.exp(v - max));
        const sum = exps.reduce((a, b) => a + b, 0);
        return exps.map((v) => v / sum);
      }

      // ================== FORWARD PASS DINAMIS ==================
      // Fungsi ini bisa membaca arsitektur APAPUN dari weight matrix
      function forwardPass(inputs, model) {
        let current = inputs;

        // Layer 1 (Hidden Layer 1)
        let z1 = matrixVectorMultiply(transpose(model.W1), current);
        z1 = vectorAdd(z1, model.b1);
        let a1 = relu(z1);

        // Layer 2 (Hidden Layer 2)
        let z2 = matrixVectorMultiply(transpose(model.W2), a1);
        z2 = vectorAdd(z2, model.b2);
        let a2 = relu(z2);

        // Layer 3 (Output Layer)
        let z3 = matrixVectorMultiply(transpose(model.W3), a2);
        z3 = vectorAdd(z3, model.b3);
        let probs = softmax(z3);

        return probs;
      }

      // ================== LOAD MODEL (Support 2 Format) ==================
      async function loadModel() {
        try {
          // Coba load concrete_model_final.json dulu
          let response = await fetch("concrete_model_final.json");
          if (!response.ok) {
            // Jika tidak ada, coba concrete_model.json
            response = await fetch("concrete_model.json");
          }
          if (!response.ok) throw new Error("Model file not found");

          const rawData = await response.json();

          // Deteksi format dan konversi ke format standar
          if (rawData.weights) {
            // Format final (dengan wrapper)
            console.log("📦 Detected format: Final model (with wrapper)");
            modelData = {
              scaler_mean: rawData.scaler_params.mean,
              scaler_std: rawData.scaler_params.std,
              W1: rawData.weights.W1,
              b1: rawData.weights.b1,
              W2: rawData.weights.W2,
              b2: rawData.weights.b2,
              W3: rawData.weights.W3,
              b3: rawData.weights.b3,
              feature_names: rawData.weights.feature_names,
              class_labels: rawData.weights.class_labels,
              accuracy: rawData.performance
                ? parseFloat(rawData.performance.accuracy_test)
                : null,
              architecture: rawData.metadata
                ? rawData.metadata.architecture
                : "Unknown",
            };
          } else {
            // Format standar (tanpa wrapper)
            console.log("📦 Detected format: Standard model");
            modelData = rawData;
          }

          // Tampilkan informasi arsitektur
          const arch = getArchitecture(modelData);
          document.getElementById("arch-info").innerHTML = `🧠 ${arch}`;
          document.getElementById("model-status").innerHTML = `✅ ${arch}`;

          console.log("✅ ANN Model loaded successfully!");
          console.log(
            `📐 Architecture: Input ${modelData.W1.length} → Hidden1 ${modelData.W1[0].length} → Hidden2 ${modelData.W2[0].length} → Output ${modelData.W3[0].length}`,
          );
        } catch (err) {
          console.error("Failed to load model:", err);
          document.getElementById("model-status").innerHTML =
            "❌ MODEL NOT FOUND";
          document.getElementById("arch-info").innerHTML =
            "⚠️ Model file not found. Please ensure concrete_model_final.json or concrete_model.json is in the same folder.";
          alert(
            "Gagal memuat model ANN. Pastikan file 'concrete_model_final.json' atau 'concrete_model.json' ada di folder yang sama.",
          );
        }
      }

      // Fungsi untuk mendapatkan string arsitektur
      function getArchitecture(model) {
        const inputDim = model.W1.length;
        const hidden1Dim = model.W1[0].length;
        const hidden2Dim = model.W2[0].length;
        const outputDim = model.W3[0].length;
        return `${inputDim}→${hidden1Dim}→${hidden2Dim}→${outputDim}`;
      }

      // Generate Input Fields
      function generateInputs() {
        const container = document.getElementById("input-fields");
        container.innerHTML = "";

        fields.forEach((field) => {
          const div = document.createElement("div");
          div.className = "input-card glass rounded-2xl p-5";
          div.innerHTML = `
          <div class="flex items-center gap-3 mb-3">
            <span class="text-2xl">${field.icon}</span>
            <label class="font-medium text-sm">${field.label}</label>
          </div>
          <div class="flex gap-4 items-center">
            <input type="number" id="${field.id}" value="${field.default}" 
                   class="bg-slate-900 border border-slate-600 focus:border-cyan-400 rounded-xl px-4 py-3 w-28 text-center text-lg font-semibold focus:outline-none">
            <input type="range" id="${field.id}-slider" min="${field.min}" max="${field.max}" step="${field.step}" value="${field.default}"
                   class="flex-1 accent-cyan-400">
          </div>
        `;
          container.appendChild(div);

          // Sync number & slider
          const numInput = div.querySelector(`#${field.id}`);
          const slider = div.querySelector(`#${field.id}-slider`);

          numInput.addEventListener("input", () => {
            slider.value = numInput.value;
            updateLivePreview();
          });
          slider.addEventListener("input", () => {
            numInput.value = slider.value;
            updateLivePreview();
          });
        });
      }

      // Live Preview
      function updateLivePreview() {
        const preview = document.getElementById("live-preview");
        let html = "";

        let totalBinder = 0;
        let water = parseFloat(document.getElementById("water").value) || 0;

        fields.forEach((f) => {
          const val = parseFloat(document.getElementById(f.id).value) || 0;
          if (["cement", "slag", "flyash"].includes(f.id)) totalBinder += val;

          html += `
          <div class="flex justify-between items-center">
            <span class="text-slate-400">${f.icon} ${f.label.split(" ")[0]}</span>
            <span class="font-mono font-semibold">${val.toFixed(1)}</span>
          </div>
        `;
        });

        const wbRatio =
          totalBinder > 0 ? (water / totalBinder).toFixed(3) : "-";
        html += `
        <div class="pt-4 border-t border-slate-700 text-xs flex justify-between">
          <span class="text-emerald-400">Total Binder</span>
          <span class="font-semibold">${totalBinder.toFixed(0)} kg/m³</span>
        </div>
        <div class="text-xs flex justify-between">
          <span class="text-emerald-400">Water/Binder Ratio</span>
          <span class="font-semibold">${wbRatio}</span>
        </div>
      `;

        preview.innerHTML = html;
      }

      // Load Preset
      function loadPreset(type) {
        if (type === 0) {
          // Normal
          setValues(350, 0, 50, 180, 2.5, 1050, 720, 28);
        } else if (type === 1) {
          // High Strength
          setValues(480, 60, 40, 160, 6, 980, 650, 28);
        } else if (type === 2) {
          // Eco
          setValues(280, 120, 100, 165, 3, 1080, 740, 56);
        }
        updateLivePreview();
      }

      function setValues(c, s, fa, w, sp, co, fi, a) {
        document.getElementById("cement").value = c;
        document.getElementById("slag").value = s;
        document.getElementById("flyash").value = fa;
        document.getElementById("water").value = w;
        document.getElementById("superplasticizer").value = sp;
        document.getElementById("coarse").value = co;
        document.getElementById("fine").value = fi;
        document.getElementById("age").value = a;

        // Update sliders juga
        fields.forEach((f) => {
          const slider = document.getElementById(f.id + "-slider");
          if (slider) slider.value = document.getElementById(f.id).value;
        });
      }

      // ================== PREDIKSI UTAMA ==================
      function predictConcrete() {
        if (!modelData) {
          alert("Model ANN belum siap. Tunggu sebentar atau refresh halaman.");
          return;
        }

        const btn = document.getElementById("predict-btn");
        const btnText = document.getElementById("btn-text");
        const originalText = btnText.innerHTML;
        btnText.innerHTML = `<span class="inline-block animate-pulse">Proses...</span>`;
        btn.disabled = true;

        try {
          // Ambil nilai input
          const inputs = [
            parseFloat(document.getElementById("cement").value) || 0,
            parseFloat(document.getElementById("slag").value) || 0,
            parseFloat(document.getElementById("flyash").value) || 0,
            parseFloat(document.getElementById("water").value) || 0,
            parseFloat(document.getElementById("superplasticizer").value) || 0,
            parseFloat(document.getElementById("coarse").value) || 0,
            parseFloat(document.getElementById("fine").value) || 0,
            parseFloat(document.getElementById("age").value) || 0,
          ];

          // Standardisasi
          const scaled = inputs.map(
            (v, i) => (v - modelData.scaler_mean[i]) / modelData.scaler_std[i],
          );

          // Forward pass dinamis (bisa untuk arsitektur apapun)
          const probs = forwardPass(scaled, modelData);

          // Tampilkan hasil
          displayResults(probs);
        } catch (e) {
          console.error("Prediction error:", e);
          alert(
            "Terjadi kesalahan saat memproses prediksi. Periksa console untuk detail.",
          );
        }

        // Reset button
        setTimeout(() => {
          btnText.innerHTML = `Selesai! ${originalText}`;
          setTimeout(() => {
            btnText.innerHTML = originalText;
            btn.disabled = false;
          }, 2000);
        }, 500);
      }

      // Tampilkan Hasil
      function displayResults(probs) {
        const labels = modelData.class_labels || [
          "Low Strength",
          "Medium Strength",
          "High Strength",
        ];
        const maxIdx = probs.indexOf(Math.max(...probs));
        const confidence = (probs[maxIdx] * 100).toFixed(1);

        document.getElementById("placeholder").classList.add("hidden");
        const resultContent = document.getElementById("result-content");
        resultContent.classList.remove("hidden");

        // Main Result
        const colors = ["#f87171", "#fbbf24", "#4ade80"];
        const mainHTML = `
        <div class="text-5xl font-bold mb-2" style="color:${colors[maxIdx]}">
          ${labels[maxIdx]}
        </div>
        <div class="text-cyan-400 font-medium">Confidence: ${confidence}%</div>
        ${modelData.accuracy ? `<div class="text-slate-400 text-xs mt-2">Model Accuracy: ${modelData.accuracy}%</div>` : ""}
      `;
        document.getElementById("main-result").innerHTML = mainHTML;

        // Radar Chart
        const ctx = document.getElementById("strengthChart");
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
          type: "radar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Probability (%)",
                data: probs.map((p) => p * 100),
                backgroundColor: "rgba(34, 211, 238, 0.25)",
                borderColor: "#22d3ee",
                borderWidth: 3,
                pointBackgroundColor: "#fff",
                pointBorderColor: "#22d3ee",
              },
            ],
          },
          options: {
            scales: {
              r: {
                min: 0,
                max: 100,
                grid: { color: "#334155" },
                ticks: { color: "#64748b" },
              },
            },
            plugins: { legend: { display: false } },
          },
        });

        // Probability Bars
        let barsHTML = "";
        probs.forEach((prob, i) => {
          const percent = (prob * 100).toFixed(1);
          barsHTML += `
          <div>
            <div class="flex justify-between text-xs mb-1.5">
              <span>${labels[i]}</span>
              <span class="font-mono">${percent}%</span>
            </div>
            <div class="h-2.5 bg-slate-700 rounded-full overflow-hidden">
              <div class="progress-bar h-full bg-gradient-to-r from-cyan-400 to-indigo-500" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
        });
        document.getElementById("prob-list").innerHTML = barsHTML;
      }

      // ================== INITIALIZATION ==================
      window.onload = async () => {
        generateInputs();
        updateLivePreview();
        await loadModel();
        updateLivePreview();

        // Set default button text
        const btnText = document.getElementById("btn-text");
        btnText.innerHTML = `Jalankan Prediksi`;
      };
    </script>
  </body>
</html>
